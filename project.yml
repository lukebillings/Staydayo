name: Staydayo
options:
  bundleIdPrefix: com.lukebillings
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupOrdering:
    - order: [Staydayo]

targets:
  Staydayo:
    type: application
    platform: iOS
    sources:
      - path: Staydayo
    entitlements:
      path: Staydayo/Staydayo.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukebillings.Staydayo
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Staydayo
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Unlock your document vault securely."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Add travel documents to your vault."
        INFOPLIST_KEY_NSCameraUsageDescription: "Scan documents into your vault."
        INFOPLIST_KEY_UIBackgroundModes: remote-notification
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: $(inherited) DEBUG
